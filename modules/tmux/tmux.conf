# Use colors in terminal!
# Honestly, fuck this bullshit. Terminal emulators are fucking stupid.
if-shell 'infocmp tmux-256color' { set default-terminal tmux-256color } { set default-terminal screen-256color }

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins"

# Set the prefix to Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

if-shell '[ -n "$WAYLAND_DISPLAY" ]' { set copy-command wl-copy }
set exit-empty off
set exit-unattached off

# Automatically set window title
set -g automatic-rename on
# Automatically renumber windows when one is closed
set -g renumber-windows on

# Allow tmux to set terminal title
set -g set-titles on

# What neovim says to do!
set escape-time 10
set focus-events on

# Use mouse click to select terminal
set -g mouse on

# History
set -g history-limit 10000
set history-file "$XDG_STATE_HOME/tmux/history"

# Allow applications in the terminal to set the system clipboard
set -g set-clipboard on

set -g allow-passthrough on
set extended-keys on

# Styling
set -g clock-mode-style 24
set -g copy-mode-current-match-style bg=colour2,fg=colour0
set -g copy-mode-match-style bg=#ffffff,fg=colour0
set -g copy-mode-mark-style bg=#ffffff,fg=colour0
set -g cursor-colour "#ffffff"
set -g cursor-style bar
set -g message-command-style bg=#22252C,fg=#ffffff
set -g message-style bg=#22252C,fg=#ffffff
set -g mode-style bg=colour2,fg=colour0
set -g pane-active-border-style bg=colour0,fg=colour2,bold
set -g pane-border-format "#{pane_index} #{pane_current_command} (#{pane_pid})"
set -g pane-border-indicators colour
set -g pane-border-status top
set -g pane-border-style bg=colour0
set -g popup-border-style fg=colour2,bold
set -g prompt-cursor-colour "#ffffff"
set -g prompt-cursor-style bar
set -g status-justify left
set -g status-left "#{?session_grouped,#[bg=colour4 fg=#000000] #{session_group} #[bg=colour5 fg=colour4],}#[bg=colour5,fg=#000000] #S#[noitalics] #[bg=#22252C,fg=colour5]"
set -g status-left-length 40
set -g status-position bottom
set -g status-right "#[bg=#22252C,fg=colour1]#[bg=colour1,fg=#000000] #h #[bg=colour1,fg=colour3]#[bg=colour3,fg=#000000] #(date +%Y-%m-%d) #[bg=colour3,fg=colour11]#[bg=colour11,fg=#000000] #(date +%H:%M) "
set -g status-right-length 60
set -g status-style bg=#22252C,fg=#000000
set -g window-status-activity-style noreverse,bold
set -g window-status-bell-style noreverse,bold
set -g window-status-current-format " #I:#W#F "
set -g window-status-current-style fg=colour2,bold
set -g window-status-format " #I:#W#F "
set -g window-status-style fg=colour15
set -g window-status-last-style fg=colour6,bold
set -g window-status-separator "#[bg=#22252C,fg=colour15]"
set -g window-style bg=colour0

# Use VI keybindings
set -g mode-keys vi
set -g status-keys emacs

# Reload tmux config
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf"

# On Cloud Desktops, $HOME is a symlink to /local/home/$USER, but
# #{pane_current_path} resolves to the physical path. Rewrite it so new
# panes/windows/sessions stay under $HOME. No-op elsewhere.
bind \\ split-window -h -c "#{s|^/local/home/|/home/|:pane_current_path}"
bind - split-window -v -c "#{s|^/local/home/|/home/|:pane_current_path}"

bind | split-window -f -h -c "#{s|^/local/home/|/home/|:pane_current_path}"
bind _ split-window -f -v -c "#{s|^/local/home/|/home/|:pane_current_path}"

# New windows will inherit current path
bind c new-window -c "#{s|^/local/home/|/home/|:pane_current_path}"

bind -r H swap-window -d -t -1
bind -r L swap-window -d -t +1
bind S display-popup -E -w 25% -h 3 "$HOME/.local/libexec/tmux/session-input"
bind s run-shell "$HOME/.local/libexec/tmux/fzf-sessions || true"

# Copy/paste
bind -T copy-mode-vi y send-keys -X copy-pipe "wl-copy && wl-paste -n | wl-copy -p"
# Feels more like Vi than <space>
bind -T copy-mode-vi v send-keys -X begin-selection
# bind v run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "wl-copy && wl-paste -n | wl-copy -p"

set -g @plugin "tmux-plugins/tpm"

set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @resurrect-strategy-vim "session"
set -g @resurrect-strategy-nvim "session"

set -g @plugin "tmux-plugins/tmux-open"
set -g @open-S "https://www.duckduckgo.com/"

# set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @yank_action 'copy-pipe'

if-shell 'test ! -d "$XDG_DATA_HOME/tmux/plugins/tpm"' \
   'run "git clone --depth=1 https://github.com/tmux-plugins/tpm $XDG_DATA_HOME/tmux/plugins/tpm && $XDG_DATA_HOME/tmux/plugins/tpm/bin/install_plugins"'

# Initialize TMUX plugin manager
run '$XDG_DATA_HOME/tmux/plugins/tpm/tpm'
